# ===================================================================
# DATA SOURCE CONFIGURATION - H2 FILE EMBEDDED (PERSIST\u00caNCIA LOCAL)
# ===================================================================
# O Spring vai criar um banco de dados real em arquivo dentro do seu projeto
spring.datasource.url=jdbc:h2:file:./data/gerenciador_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===================================================================
# JPA / HIBERNATE CONFIGURATIONS
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ativa o painel visual do banco no navegador caso queira analisar as tabelas
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console